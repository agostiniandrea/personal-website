name: Dependabot Auto-Build

on:
  push:
    branches:
      - main

permissions:
  contents: write  # Required to allow Dependabot to write to the main branch

jobs:
  build-and-deploy:
    if: github.actor == 'dependabot[bot]'  # ✅ Esegue SOLO se il commit è di Dependabot
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Trigger Vercel Build
        run: curl -X POST $VERCEL_DEPLOY_HOOK

      - name: Send Slack Notification on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"❌ Vercel build failed after Dependabot update!"}' $SLACK_WEBHOOK_URL
