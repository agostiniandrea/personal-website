name: Dependabot Auto-Build

on:
  push:
    branches:
      - main

permissions:
  contents: write  # Required to allow Dependabot to write to the main branch

jobs:
  build-and-deploy:
    if: github.actor == 'dependabot[bot]'  # ✅ Esegue SOLO se il commit è di Dependabot
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Trigger Vercel Build
        run: curl -X POST https://api.vercel.com/v1/integrations/deploy/prj_11XuKOCYJ67iB6zSYRV9Nm917Dus/5pDUIPbL1E

      - name: Send Slack Notification on Failure
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"❌ Vercel build failed after Dependabot update! Check logs: https://vercel.com/andrea-agostinis-projects/alicediantonio/deployments"}' $SLACK_WEBHOOK_URL
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
