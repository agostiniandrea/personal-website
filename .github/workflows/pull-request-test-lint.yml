name: Test & Lint

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  pull-requests: write
  issues: read

jobs:
  test-and-lint:
    name: Tests & Lint
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.actor, 'dependabot') }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Enable Corepack
        run: corepack enable

      - name: Set Yarn version
        run: corepack prepare yarn@4.9.1 --activate

      - name: Install dependencies
        run: yarn install

      - name: Type-check TypeScript
        run: yarn build:config

      - name: Run tests
        run: yarn test

      - name: Run lint
        run: yarn lint

      - name: Build for Lighthouse
        run: yarn build:compile
        env:
          NEXT_PUBLIC_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          NEXT_PUBLIC_CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          NEXT_PUBLIC_SITE_URL: http://localhost:3000

      - name: Run Lighthouse CI (desktop)
        run: |
          yarn start &
          npx wait-on http://localhost:3000 --timeout 30000
          yarn lhci

      - name: Run Lighthouse CI (mobile)
        run: npx lhci autorun --config=.lighthouserc.mobile.json
