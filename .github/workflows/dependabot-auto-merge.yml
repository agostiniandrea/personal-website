name: Dependabot Auto-Merge
on:
  pull_request:
  push:
    branches:
      - main

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Extract updated dependency from commit message
        run: |
          DEP_PACKAGE=$(git log -1 --pretty=format:%s | grep -oP '(?<=bump )[a-zA-Z0-9\-_]+')
          if [ -z "$DEP_PACKAGE" ]; then
            echo "No dependency found in commit message" > dependencies.log
          else
            echo "Updated dependency: $DEP_PACKAGE" > dependencies.log
          fi
          echo "DEPENDENCIES=$(cat dependencies.log | tr '\n' ' ')" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          yarn install 2> yarn-error.log || true
          tail -n 20 yarn-error.log >> dependencies.log

      - name: Debug Dependencies
        run: cat dependencies.log

      - name: Send Slack notification if build fails
        if: failure() && github.actor == 'dependabot[bot]'
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{"text":"❌ *Build Failed!* Dependabot package update failed.\n\n*Updated dependency:* '"$DEPENDENCIES"'\nCheck the build logs: <'"$BUILD_URL"'|View Build>"}' "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPENDENCIES: ${{ env.DEPENDENCIES }}
          BUILD_URL: ${{ github.server_url }}/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}
