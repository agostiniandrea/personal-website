name: Dependabot Auto-Merge

on:
  pull_request_target:
    types: [opened, synchronize] # Trigger when a PR is opened or updated (synchronize)
    branches:
      - main # Only for PRs targeting the `main` branch

jobs:
  auto-merge-dependabot:
    runs-on: ubuntu-latest
    # Run the job only if the PR is from Dependabot
    if: ${{ startsWith(github.actor, 'dependabot') }}

    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract updated dependency from PR title
        id: extract_pr_title
        run: |
          PR_TITLE="${{ github.event.pull_request.title }}"
          echo "🔍 PR title: $PR_TITLE"

          # Regex matching for 'bump <package> from <old-version> to <new-version>'
          if [[ "$PR_TITLE" =~ bump[[:space:]]+([a-zA-Z0-9@_\./\-]+)[[:space:]]+from[[:space:]]+([0-9a-zA-Z\.\-]+)[[:space:]]+to[[:space:]]+([0-9a-zA-Z\.\-]+) ]]; then
            DEP_PACKAGE="${BASH_REMATCH[1]}"
            FROM_VERSION="${BASH_REMATCH[2]}"
            TO_VERSION="${BASH_REMATCH[3]}"
            echo "✅ Match!"
            echo "📦 Package: $DEP_PACKAGE"
            echo "⬅️  From: $FROM_VERSION"
            echo "➡️  To: $TO_VERSION"
            echo "DEPENDENCY=$DEP_PACKAGE" >> $GITHUB_ENV
            echo "FROM_VERSION=$FROM_VERSION" >> $GITHUB_ENV
            echo "TO_VERSION=$TO_VERSION" >> $GITHUB_ENV
            echo "Updated dependency: $DEP_PACKAGE from $FROM_VERSION to $TO_VERSION" > dependencies.log
          else
            echo "❌ No match found in PR title"
            echo "DEPENDENCY=" >> $GITHUB_ENV
            echo "FROM_VERSION=" >> $GITHUB_ENV
            echo "TO_VERSION=" >> $GITHUB_ENV
            echo "No dependency found in PR title" > dependencies.log
          fi

      - name: Install
        run: |
          yarn install --immutable
          yarn build:config
          npm i -g vercel@latest

      - name: Get Vercel .env file
        run: |
          vercel env pull .env --yes --environment=preview --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build
        run: |
          yarn build:config && yarn build:compile
        env:
          NEXT_PUBLIC_CONTENTFUL_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_CONTENTFUL_ACCESS_TOKEN }}
          NEXT_PUBLIC_CONTENTFUL_PREVIEW_ACCESS_TOKEN: ${{ secrets.NEXT_PUBLIC_CONTENTFUL_PREVIEW_ACCESS_TOKEN }}
          NEXT_PUBLIC_CONTENTFUL_SPACE_ID: ${{ secrets.NEXT_PUBLIC_CONTENTFUL_SPACE_ID }}

      - name: Send Slack notification if build fails
        if: failure()
        run: |
          curl -X POST -H 'Content-type: application/json' --data '{
            "text": "❌ *Build Failed!* Dependabot package update failed.\n\n*Error while trying to update:* \"'"$DEPENDENCY"'\" from version *'"$FROM_VERSION"'* to *'"$TO_VERSION"'*\nCheck the build logs: <'"$BUILD_URL"'|View Build>"
          }' "$SLACK_WEBHOOK_URL"
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DEPENDENCY: ${{ env.DEPENDENCY }}
          FROM_VERSION: ${{ env.FROM_VERSION }}
          TO_VERSION: ${{ env.TO_VERSION }}
          BUILD_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
      
      - name: Fail job if build failed
        if: failure()
        run: exit 1

      # Wait until PR is mergeable (prevents random 'not mergeable' errors)
      - name: Wait until PR is mergeable (with reason if failed)
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = context.payload.pull_request.number;
            let maxTries = 10;
            let delay = ms => new Promise(res => setTimeout(res, ms));
            let lastState = null;
      
            for (let i = 0; i < maxTries; i++) {
              const { data: pr } = await github.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber
              });
              console.log(`Try ${i + 1}: mergeable=${pr.mergeable}, state=${pr.mergeable_state}`);
              lastState = pr.mergeable_state;
      
              if (pr.mergeable && pr.mergeable_state === "clean") {
                console.log("✅ PR is mergeable!");
                return;
              }
              await delay(5000);
            }
      
            // 💬 Post a comment explaining why merge failed
            await github.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: prNumber,
              body: `❌ This PR could not be auto-merged. Mergeable state: **${lastState}**.\n\nPossible reasons:\n- 🔄 Out of date with base branch\n- ⚠️ Merge conflicts\n- 🚫 Required checks not passing\n\nPlease update the PR to resolve the issue.`
            });
      
            throw new Error(`❌ PR is not mergeable after waiting. Last state: ${lastState}`);

      - name: Merge PR from dependabot
        if: success()
        uses: fastify/github-action-merge-dependabot@v3
        with:
          merge-method: squash
