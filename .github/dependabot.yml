version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    allow:
      - dependency-name: "next"
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 0
    rebase-strategy: auto
    target-branch: "main"
    commit-signature: true
    token: "${{ secrets.DEPENDABOT_PAT }}"  # ✅ Allows Dependabot to commit directly
