version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'daily'
    allow:
      - dependency-name: 'next'
    commit-message:
      prefix: "chore(deps)"
    open-pull-requests-limit: 0  # ❗ Prevent PRs from being created
    versioning-strategy: increase
    rebase-strategy: auto  # Automatically rebase and commit changes
    target-branch: "main"  # Push updates directly to main