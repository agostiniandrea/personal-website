version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
    groups:
      eslint-updates:
        patterns:
          - "eslint"
      next-updates:
        patterns:
          - "next"
    ignore:
      - dependency-name: "*"
