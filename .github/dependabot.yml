version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "13:52"
      timezone: America/New_York
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
    allow:
      - dependency-name: "next"
    ignore:
      - dependency-type: "all"
